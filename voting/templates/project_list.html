<!DOCTYPE html>
<html>
<head>
    <title>투표 시스템</title>
</head>
<body>
    <h1>프로젝트 투표</h1>

    {% for project in projects %}
        <div>
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
            <p>투표 수: {{ project.votes }}</p>

            <a href="{% url 'vote' project.id %}">
                <button>투표하기</button>
            </a>
        </div>
        <hr>
    {% endfor %}
</body>
</html>
